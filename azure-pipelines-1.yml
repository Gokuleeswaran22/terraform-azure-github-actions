trigger: none

parameters:
- name: environment
  displayName: Select Environment
  type: string
  default: prod
  values:
  - dev
  - qa
  - prod

- name: diskSize
  displayName: Enter Disk Size in GB
  type: string
  default: '128'

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: 'Azure-ServiceConnection'

steps:
- task: TerraformInstaller@1
  displayName: Install Terraform
  inputs:
    terraformVersion: '1.15.8'

- task: AzureCLI@2
  displayName: 'Terraform Plan and Apply - ${{ parameters.environment }}'
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      echo "Deploying environment: ${{ parameters.environment }}"
      echo "Disk size: ${{ parameters.diskSize }} GB"

      terraform init \
        -reconfigure \
        -backend-config="key=${{ parameters.environment }}.terraform.tfstate"

      terraform plan \
        -var-file="environments/${{ parameters.environment }}.tfvars" \
        -var="data_disk_size_gb=${{ parameters.diskSize }}" \
        -out=tfplan

      terraform apply \
        -auto-approve \
        tfplan