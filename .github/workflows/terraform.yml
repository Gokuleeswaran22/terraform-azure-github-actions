name: Terraform Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      diskSize:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Check if secrets are available
        run: |
          echo "Checking secrets..."

          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            echo "❌ AZURE_CLIENT_ID is EMPTY"
          else
            echo "✅ AZURE_CLIENT_ID is available"
          fi

          if [ -z "${{ secrets.AZURE_TENANT_ID }}" ]; then
            echo "❌ AZURE_TENANT_ID is EMPTY"
          else
            echo "✅ AZURE_TENANT_ID is available"
          fi

          if [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "❌ AZURE_SUBSCRIPTION_ID is EMPTY"
          else
            echo "✅ AZURE_SUBSCRIPTION_ID is available"
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set environment name to lowercase
        run: |
          echo "ENV_LOWER=$(echo '${{ inputs.environment }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Terraform Init
        run: |
          terraform init \
            -reconfigure \
            -backend-config="key=${ENV_LOWER}.terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="environments/${ENV_LOWER}.tfvars" \
            -var="data_disk_size_gb=${{ inputs.diskSize }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan